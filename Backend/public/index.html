<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PropOS Enterprise — Login</title>
  <meta name="description" content="Sign in to PropOS Enterprise Point-of-Sale system"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-blob blob-1"></div>
    <div class="auth-blob blob-2"></div>
  </div>

  <main class="auth-container">
    <div class="auth-card" id="login-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="10" fill="url(#grad)"/>
            <path d="M12 14h16M12 20h10M12 26h13" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="29" cy="26" r="4" fill="#fff" opacity="0.9"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">PropOS</h1>
          <span class="logo-sub">Enterprise</span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Alert -->
      <div class="alert hidden" id="alert"></div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email address</label>
          <input type="email" id="login-email" placeholder="you@company.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="eye-btn" onclick="togglePassword('login-password', this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label for="reg-email">Email address</label>
          <input type="email" id="reg-email" placeholder="you@company.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password"/>
            <button type="button" class="eye-btn" onclick="togglePassword('reg-password', this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-role">Role</label>
          <select id="reg-role">
            <option value="cashier">Cashier</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn-primary" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <!-- API Status indicator -->
      <div class="api-status" id="api-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Checking connection...</span>
      </div>
      <div class="api-base-hint" id="api-base-hint">API Base: detecting...</div>

    </div>
  </main>

  <script src="js/config.js?v=20260414"></script>
  <script src="js/auth.js?v=20260414"></script>
</body>
</html>
